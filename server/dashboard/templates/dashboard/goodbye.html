<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ai-maxx-ide — shutdown</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f1419;
      color: #e7ecf3;
    }
    .box {
      text-align: center;
      max-width: 420px;
      padding: 2rem;
    }
    p { color: #8b98a8; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Server stopped</h1>
    <p>Schedulers removed. This tab will close — you can close it manually if it does not.</p>
  </div>
  <script>
    setTimeout(function () { window.close(); }, 1200);
  </script>
</body>
</html>
