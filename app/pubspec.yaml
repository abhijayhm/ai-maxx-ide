name: ai_maxx_ide
description: "AI Maxx IDE - Cursor mobile copilot."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  web_socket_channel: ^3.0.2
  flutter_secure_storage: ^9.2.4
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  crypto: ^3.0.6
  device_info_plus: ^11.5.0
  google_fonts: ^6.2.1
  path: ^1.9.1
  flutter_webrtc: ^1.2.0
  flutter_code_editor: ^0.3.5
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  in_app_file_view: ^1.1.1
  markdown_widget: ^2.3.2+8
  flutter_foreground_task: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#121B2B"
  adaptive_icon_foreground: assets/branding/icon.png
  web:
    generate: true
    image_path: assets/branding/icon.png
    background_color: "#121B2B"
    theme_color: "#121B2B"
  windows:
    generate: true
    image_path: assets/branding/icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/branding/icon.png

flutter_native_splash:
  color: "#121B2B"
  image: assets/branding/icon.png
  android_12:
    color: "#121B2B"
    image: assets/branding/icon.png
    icon_background_color: "#121B2B"
  ios: true
  android: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/branding/icon.png
